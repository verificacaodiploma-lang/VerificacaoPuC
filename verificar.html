<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Verificação de Diplomas</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6fa;
}

header{
  background:#1e3a8a;
  color:white;
  padding:16px;
  display:flex;
  align-items:center;
  gap:10px;
}

header img{
  width:40px;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.search{
  background:white;
  padding:20px;
  border-radius:8px;
  display:flex;
  gap:10px;
}

.search input{
  flex:1;
  padding:12px;
}

.search button{
  background:#1e3a8a;
  color:white;
  border:none;
  padding:12px;
  cursor:pointer;
}

.card{
  background:white;
  padding:20px;
  margin-top:20px;
  border-radius:8px;
}

.label{
  background:#1e3a8a;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  font-weight:700;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <strong>PUC — Sistema de Verificação</strong>
</header>

<div class="container">

<h2>Verificação de Diplomas</h2>

<div class="search">
  <input id="q" placeholder="Digite o número do diploma">
  <button onclick="buscar()">Consultar</button>
</div>

<div class="card">
  <h2 id="name">—</h2>
  <div id="degree">—</div>
  <div id="inst">—</div>
  <div id="date">—</div>

  <br>

  <span class="label" id="status">—</span>

  <hr>

  <div id="dnum">—</div>
</div>

</div>

<script>
const records={
  '153564-12':{
    name:'Maria Aparecida Monteiro',
    degree:'Bacharel em Artes',
    inst:'PUC Minas',
    date:'Conclusão em 2025',
    status:'Ativo',
    diploma:'153564-12'
  },

  '357754-88':{
    name:'Denizia Cândida da Silva Santos',
    degree:'Mestrado em Educação',
    inst:'Católica do Rio de Janeiro - PUC',
    date:'Conclusão em 19/12/2025',
    status:'Ativo',
    diploma:'357754-88'
  },

  '3555445-88':{
    name:'Elisangela Freitas da Silva',
    degree:'Pós-Graduação em Avaliação Neuropsicologica',
    inst:'Pontifícia Universidade Católica do Rio de Janeiro',
    date:'Conclusão em 19/12/2025',
    status:'Ativo',
    diploma:'3555445-88'
  },

  '36677543-90':{
    name:'Francinaldo Silva dos Santos',
    degree:'Doutorado em Educação: com especialidade em IA e Tecnologia Educacional',
    inst:'Pontifícia Universidade Católica do Rio de Janeiro',
    date:'Conclusão em 23/02/2026',
    status:'Ativo',
    diploma:'36677543-90'
  },

  '134597-43':{
    name:'Adriana dos Santos Silva Frazão',
    degree:'Bacharel em Teologia',
    inst:'Pontifícia Universidade Católica do Rio de Janeiro',
    date:'Conclusão em 19/01/2024',
    status:'Ativo',
    diploma:'134597-43'
  },

  '256754-75':{
    name:'Maria Marta Viana da Silva',
    degree:'Doutorado em Educação',
    inst:'Pontifícia Universidade Católica de São Paulo',
    date:'Conclusão em 23/06/2023',
    status:'Ativo',
    diploma:'256754-75'
  }
};

function buscar(){
  let q=document.getElementById('q').value.trim();
  let r=records[q];

  if(r){
    document.getElementById('name').innerText=r.name;
    document.getElementById('degree').innerText=r.degree;
    document.getElementById('inst').innerText=r.inst;
    document.getElementById('date').innerText=r.date;
    document.getElementById('status').innerText=r.status;
    document.getElementById('dnum').innerText=r.diploma;
  }else{
    alert('Diploma não encontrado');
  }
}
</script>

</body>
</html>
